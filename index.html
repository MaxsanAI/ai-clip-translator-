<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Translator Tools</title>
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.11/dist/ffmpeg.min.js"></script>
<style>
body{
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
  text-align:center;
  padding:20px;
  margin:0;
}
.container{
  max-width:800px;
  margin:auto;
  background:#1e293b;
  padding:25px;
  border-radius:20px;
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
}
h1{margin-bottom:25px;}
.tool{
  margin-bottom:40px;
  padding:20px;
  background:#0f172a;
  border-radius:15px;
}
button{
  background:#6366f1;
  border:none;
  padding:12px 25px;
  color:white;
  font-size:15px;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}
button:hover{background:#4f46e5;}
select,input{
  margin:10px;
  padding:10px;
  border-radius:6px;
  border:none;
  width:90%;
  max-width:400px;
}
.download{margin-top:15px;}
</style>
</head>

<body>
<div class="container">
<h1>AI Translator Tools</h1>

<!-- VIDEO TRANSLATOR -->
<div class="tool">
<h2>🎬 Video Translator</h2>
<input type="file" id="videoInput" accept="video/*"><br>
<select id="langSelect" multiple>
<option value="en">English</option>
<option value="sr">Serbian</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
<option value="de">German</option>
<option value="it">Italian</option>
<option value="tr">Turkish</option>
<option value="ja">Japanese</option>
<option value="sv">Swedish</option>
</select><br>
<button onclick="generateSRT()">Generate SRT</button>
<button onclick="burnSubtitles()">Burn Subtitles Into Video</button>
<div id="videoDownloads"></div>
</div>

<!-- YOUTUBE TOOL -->
<div class="tool">
<h2>📺 YouTube Subtitle Generator</h2>
<input type="text" id="youtubeURL" placeholder="Paste YouTube link"><br>
<select id="ytLang">
<option value="en">English</option>
<option value="sr">Serbian</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
<option value="de">German</option>
<option value="it">Italian</option>
<option value="tr">Turkish</option>
<option value="ja">Japanese</option>
<option value="sv">Swedish</option>
</select><br>
<button onclick="youtubeSubs()">Generate Subtitles</button>
<div id="ytDownload"></div>
</div>

<!-- DOCUMENT TRANSLATOR -->
<div class="tool">
<h2>📄 Document Translator</h2>
<input type="file" id="docInput"><br>
<select id="docLang">
<option value="en">English</option>
<option value="sr">Serbian</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
<option value="de">German</option>
<option value="it">Italian</option>
<option value="tr">Turkish</option>
<option value="ja">Japanese</option>
<option value="sv">Swedish</option>
</select><br>
<button onclick="translateDoc()">Translate Document</button>
<div id="docDownload"></div>
</div>

</div>

<script>
const API="https://video-translator-api.maximhot.workers.dev/"
let currentVideo=null;
const srtCache = {}; // čuva generisane SRT za svaki jezik

// ---- VIDEO SRT ----
async function generateSRT(langOnly) {
  const file=document.getElementById("videoInput").files[0];
  if(!file){alert("Upload video first"); return;}
  currentVideo=file;
  const langs = langOnly ? [langOnly] : [...document.getElementById("langSelect").selectedOptions].map(o=>o.value);
  const form=new FormData();
  form.append("video",file);
  langs.forEach(l=>form.append("languages",l));
  const statusDiv=document.getElementById("videoDownloads");
  statusDiv.innerHTML="Generating subtitles...";
  const res=await fetch(API,{method:"POST",body:form});
  const data=await res.json();
  let html="";
  for(const lang in data.subtitles){
    const srt=data.subtitles[lang];
    srtCache[lang] = srt; // čuvamo u cache za burn-in
    const blob=new Blob([srt],{type:"text/plain"});
    const url=URL.createObjectURL(blob);
    html+=`
      <div class="download">
        <a href="${url}" download="${lang}.srt"><button>Download ${lang.toUpperCase()} SRT</button></a>
      </div>`;
  }
  statusDiv.innerHTML=html;
  return srtCache;
}

// ---- BURN-IN VIDEO ----
const { createFFmpeg, fetchFile } = FFmpeg;
const ffmpeg = createFFmpeg({ log: true });

async function burnSubtitles(){
  if(!currentVideo){alert("Upload video first"); return;}
  const lang=[...document.getElementById("langSelect").selectedOptions][0].value;
  const statusDiv=document.getElementById("videoDownloads");
  statusDiv.innerHTML="Processing SRT and burning subtitles...";

  // Ako nemamo SRT u cache, generiši ga
  if(!srtCache[lang]){
    await generateSRT(lang);
  }

  const srtData = new Uint8Array(new TextEncoder().encode(srtCache[lang]));

  if(!ffmpeg.isLoaded()) await ffmpeg.load();

  const videoData = await fetchFile(currentVideo);

  ffmpeg.FS('writeFile', 'input.mp4', videoData);
  ffmpeg.FS('writeFile', 'subs.srt', srtData);

  await ffmpeg.run('-i','input.mp4','-vf',`subtitles=subs.srt:force_style='FontName=Arial,FontSize=24,PrimaryColour=&HFFFFFF&'`,'output.mp4');

  const data = ffmpeg.FS('readFile','output.mp4');
  const url = URL.createObjectURL(new Blob([data.buffer], {type: 'video/mp4'}));
  const a = document.createElement('a');
  a.href = url;
  a.download = 'video_subtitled.mp4';
  a.click();

  // Omogući i SRT download
  const srtBlob = new Blob([srtCache[lang]], {type:'text/plain'});
  const srtUrl = URL.createObjectURL(srtBlob);
  const srtA = document.createElement('a');
  srtA.href = srtUrl;
  srtA.download = `${lang}.srt`;
  srtA.textContent = `Download ${lang.toUpperCase()} SRT`;
  const div = document.createElement('div');
  div.className='download';
  div.appendChild(srtA);
  statusDiv.appendChild(div);

  statusDiv.innerHTML+="<br>Video ready!";
}

// ---- YOUTUBE SUBS ----
async function youtubeSubs(){
  const url=document.getElementById("youtubeURL").value;
  const lang=document.getElementById("ytLang").value;
  if(!url){alert("Paste YouTube link"); return;}
  const statusDiv=document.getElementById("ytDownload");
  statusDiv.innerHTML="Generating subtitles...";
  const res=await fetch(API+"youtube",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({url:url,lang:lang})});
  const data=await res.json();
  const a = document.createElement('a');
  a.href = data.srt;
  a.download = 'youtube_subs.srt';
  a.click();
  statusDiv.innerHTML="YouTube SRT ready!";
}

// ---- DOCUMENT TRANSLATOR ----
async function translateDoc(){
  const file=document.getElementById("docInput").files[0];
  if(!file){alert("Upload document"); return;}
  const lang=document.getElementById("docLang").value;
  const form=new FormData();
  form.append("document",file);
  form.append("target",lang);
  const statusDiv=document.getElementById("docDownload");
  statusDiv.innerHTML="Translating...";
  const res=await fetch(API+"doc",{method:"POST",body:form});
  const blob=await res.blob();
  const url=URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url;
  a.download="translated.txt";
  a.click();
  statusDiv.innerHTML="Document ready!";
}
</script>

</body>
</html>
