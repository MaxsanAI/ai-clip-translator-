<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Translator Tools</title>
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.11/dist/ffmpeg.min.js"></script>
<style>
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#020617,#0f172a);color:white;text-align:center;padding:20px;margin:0;}
.container{max-width:800px;margin:auto;background:#1e293b;padding:25px;border-radius:20px;box-shadow:0 20px 50px rgba(0,0,0,0.6);}
h1{margin-bottom:25px;}
.tool{margin-bottom:40px;padding:20px;background:#0f172a;border-radius:15px;}
button{background:#6366f1;border:none;padding:12px 25px;color:white;font-size:15px;border-radius:8px;cursor:pointer;margin-top:10px;}
button:hover{background:#4f46e5;}
select,input,textarea{margin:10px;padding:10px;border-radius:6px;border:none;width:90%;max-width:400px;}
.download{margin-top:15px;}
video{margin-top:15px;max-width:100%;border-radius:10px;}
</style>
</head>
<body>
<div class="container">
<h1>AI Translator Tools</h1>

<div class="tool">
<h2>🎬 Video Translator</h2>
<input type="file" id="videoInput" accept="video/*"><br>
<select id="langSelect" multiple>
<option value="en">English</option>
<option value="sr">Serbian</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
<option value="de">German</option>
<option value="it">Italian</option>
<option value="tr">Turkish</option>
<option value="ja">Japanese</option>
<option value="sv">Swedish</option>
</select><br>
<button onclick="generateSRT()">Generate SRT</button>
<button onclick="burnSubtitles()">Burn Subtitles Into Video</button>
<div id="videoDownloads"></div>

<video id="videoPreview" controls></video><br>
<textarea id="srtEditor" rows="10" placeholder="Edit SRT here"></textarea>
<button onclick="applySrtEdits()">Apply SRT Edits</button>
</div>

<div class="tool">
<h2>📺 YouTube Subtitle Generator</h2>
<input type="text" id="youtubeURL" placeholder="Paste YouTube link"><br>
<select id="ytLang">
<option value="en">English</option>
<option value="sr">Serbian</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
<option value="de">German</option>
<option value="it">Italian</option>
<option value="tr">Turkish</option>
<option value="ja">Japanese</option>
<option value="sv">Swedish</option>
</select><br>
<button onclick="youtubeSubs()">Generate Subtitles</button>
<div id="ytDownload"></div>
</div>

<div class="tool">
<h2>📄 Document Translator</h2>
<input type="file" id="docInput"><br>
<select id="docLang">
<option value="en">English</option>
<option value="sr">Serbian</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
<option value="de">German</option>
<option value="it">Italian</option>
<option value="tr">Turkish</option>
<option value="ja">Japanese</option>
<option value="sv">Swedish</option>
</select><br>
<button onclick="translateDoc()">Translate Document</button>
<div id="docDownload"></div>
</div>
</div>

<script>
const API="https://video-translator-api.maximhot.workers.dev/"
let currentVideo = null;
let currentLang = null;
const srtCache = {};
let worker = null;

// --- Video preview ---
function srt2vtt(srtText){
  return "WEBVTT\n\n" + srtText.replace(/\r+/g,'').split("\n\n").map(block=>{
    const lines = block.split("\n");
    if(lines.length >=2) lines[1] = lines[1].replace(',', '.');
    return lines.join("\n");
  }).join("\n\n");
}

function showVideoPreview(videoFile, srtText){
  const videoEl = document.getElementById("videoPreview");
  const vtt = srt2vtt(srtText);
  const trackBlob = new Blob([vtt],{type:'text/vtt'});
  const trackURL = URL.createObjectURL(trackBlob);
  videoEl.src = URL.createObjectURL(videoFile);
  videoEl.innerHTML = `<track label="Subtitle" kind="subtitles" srclang="en" src="${trackURL}" default>`;
  videoEl.load();
}

function applySrtEdits(){
  srtCache[currentLang] = document.getElementById("srtEditor").value;
  showVideoPreview(currentVideo, srtCache[currentLang]);
}

// --- Video SRT ---
async function generateSRT(langOnly){
  const file=document.getElementById("videoInput").files[0];
  if(!file){alert("Upload video first"); return;}
  currentVideo=file;
  const langs = langOnly ? [langOnly] : [...document.getElementById("langSelect").selectedOptions].map(o=>o.value);
  const form=new FormData();
  form.append("video",file);
  langs.forEach(l=>form.append("languages",l));
  const statusDiv=document.getElementById("videoDownloads");
  statusDiv.innerHTML="Generating subtitles...";
  const res=await fetch(API,{method:"POST",body:form});
  const data=await res.json();
  let html="";
  for(const lang in data.subtitles){
    srtCache[lang] = data.subtitles[lang];
    const blob=new Blob([data.subtitles[lang]],{type:"text/plain"});
    const url=URL.createObjectURL(blob);
    html+=`<div class="download"><a href="${url}" download="${lang}.srt"><button>Download ${lang.toUpperCase()} SRT</button></a></div>`;
  }
  statusDiv.innerHTML=html;
  if(!currentLang) currentLang = langs[0];
  document.getElementById("srtEditor").value = srtCache[currentLang];
  showVideoPreview(currentVideo, srtCache[currentLang]);
}

// --- Burn-in using Worker ---
async function burnSubtitles(){
  if(!currentVideo || !currentLang){ alert("Video ili jezik nisu izabrani"); return; }
  const srtText = srtCache[currentLang];
  if(!srtText){ alert("Nema SRT za burn-in"); return; }

  const statusDiv = document.getElementById("videoDownloads");
  statusDiv.innerHTML = "Processing SRT and burning subtitles...";

  if(!worker) worker = new Worker('burnWorker.js');

  worker.onmessage = (e) => {
    if(e.data.error){
      statusDiv.innerHTML = "Error: " + e.data.error;
      return;
    }
    const buffer = e.data.videoBuffer;
    const url = URL.createObjectURL(new Blob([buffer],{type:'video/mp4'}));
    const a = document.createElement('a');
    a.href = url;
    a.download = 'video_subtitled.mp4';
    a.click();

    const srtBlob = new Blob([srtText], {type:'text/plain'});
    const srtA = document.createElement('a');
    srtA.href = URL.createObjectURL(srtBlob);
    srtA.download = `${currentLang}.srt`;
    srtA.click();

    statusDiv.innerHTML = "Video ready!";
  };

  worker.postMessage({ videoFile: currentVideo, srtText });
}

// --- YouTube Subs ---
async function youtubeSubs(){
  const url=document.getElementById("youtubeURL").value;
  const lang=document.getElementById("ytLang").value;
  if(!url){alert("Paste YouTube link"); return;}
  const statusDiv=document.getElementById("ytDownload");
  statusDiv.innerHTML="Generating subtitles...";
  const res=await fetch(API+"youtube",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({url:url,lang:lang})});
  const data=await res.json();
  const a = document.createElement('a');
  a.href = data.srt;
  a.download = 'youtube_subs.srt';
  a.click();
  statusDiv.innerHTML="YouTube SRT ready!";
}

// --- Document Translator ---
async function translateDoc(){
  const file=document.getElementById("docInput").files[0];
  if(!file){alert("Upload document"); return;}
  const lang=document.getElementById("docLang").value;
  const form=new FormData();
  form.append("document",file);
  form.append("target",lang);
  const statusDiv=document.getElementById("docDownload");
  statusDiv.innerHTML="Translating...";
  const res=await fetch(API+"doc",{method:"POST",body:form});
  const blob=await res.blob();
  const url=URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download="translated.txt";
  a.click();
  statusDiv.innerHTML="Document ready!";
}
</script>
</body>
</html>
