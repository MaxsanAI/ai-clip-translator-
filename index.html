<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Translator (Video + Documents)</title>

<!-- FFmpeg for video burn-in -->
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.11/dist/ffmpeg.min.js"></script>

<!-- PDF.js for PDF parsing -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.9.179/pdf.min.js"></script>

<!-- JSZip for DOCX parsing -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
/* (stilovi isti kao pre — skraćeno zbog dužine) */
</style>
</head>
<body>
<div class="card">
  <h1>AI Video Translator</h1>

  <!-- VIDEO TRANSLATOR -->
  <div class="dropzone" id="dropzone">Drag & Drop Video Here<br><br>or click to upload
    <input type="file" id="videoInput" accept="video/*" hidden>
  </div>

  <select id="languageSelect" multiple>
    <option value="en">English</option>
    <option value="sr">Serbian</option>
    <option value="es">Spanish</option>
    <option value="ja">Japanese</option>
    <option value="sv">Swedish</option>
    <!-- ostali -->
  </select>

  <button onclick="processVideo()">Process Video</button>
  <div class="progress"><div class="bar" id="bar"></div></div>
  <div id="status" class="status"></div>

  <hr>

  <!-- DOCUMENT TRANSLATOR -->
  <h2>Document Translator</h2>
  <input type="file" id="docInput" accept=".txt,.srt,.pdf,.docx">
  <select id="docLangSelect">
    <option value="en">English</option>
    <option value="sr">Serbian</option>
    <option value="es">Spanish</option>
    <option value="de">German</option>
    <option value="ja">Japanese</option>
    <option value="sv">Swedish</option>
  </select>
  <button onclick="translateDocument()">Translate Document</button>
  <div id="docStatus" class="status"></div>
</div>

<script>

/* VIDEO TRANSLATOR + burnInVideo funkcije — isti kao u tvom final HTML-u */

/* … (kod iz prethodnog HTML‑a za video upload i burn‑in) … */

//////////////////////////////////////////////////////
/* DOCUMENT TRANSLATOR — browser parsing PDF + DOCX */
async function extractTextFromPDF(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data:arrayBuffer }).promise;
  let text = "";
  for(let i=1; i<=pdf.numPages; i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const strings = content.items.map(item=>item.str);
    text += strings.join(" ") + "\n";
  }
  return text;
}

async function extractTextFromDOCX(file){
  const arrayBuffer = await file.arrayBuffer();
  const zip = await JSZip.loadAsync(arrayBuffer);
  const xmlText = await zip.file("word/document.xml").async("string");
  // simple tag stripper
  return xmlText.replace(/<[^>]+>/g, " ");
}

async function translateDocument(){
  const fileInput = document.getElementById("docInput");
  const lang = document.getElementById("docLangSelect").value;
  const status = document.getElementById("docStatus");

  if(!fileInput.files.length){
    status.innerHTML="Upload a document first";
    return;
  }

  const file=fileInput.files[0];
  let text="";

  status.innerHTML="Parsing document…";

  if(file.name.endsWith(".pdf")){
    text = await extractTextFromPDF(file);
  }
  else if(file.name.endsWith(".docx")){
    text = await extractTextFromDOCX(file);
  }
  else {
    text = await file.text();
  }

  status.innerHTML="Translating…";

  try{
    const resp = await fetch("https://video-translator-api.maximhot.workers.dev/doc-translate", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({content:text, target_lang:lang})
    });

    const data=await resp.json();
    const blob=new Blob([data.translated], {type:"text/plain;charset=utf-8"});
    const url=URL.createObjectURL(blob);

    const a=document.createElement("a"); a.href=url;
    a.download=`translated_${lang}_${file.name}.txt`;
    a.click();

    status.innerHTML="Translation complete!";
  } catch(err){
    console.error(err); status.innerHTML="Error translating document";
  }
}
</script>
</body>
</html>
