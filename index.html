<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Video Translator</title>

<style>

body{

font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;

display:flex;
justify-content:center;
align-items:center;

height:100vh;
margin:0;

}

.card{

background:#1e293b;
padding:30px;

border-radius:20px;

width:90%;
max-width:420px;

box-shadow:0 20px 50px rgba(0,0,0,0.6);

}

h1{

text-align:center;
margin-bottom:20px;

}

input,select,button{

width:100%;
padding:12px;

margin-top:12px;

border-radius:10px;
border:none;

font-size:15px;

}

select{

height:120px;

}

button{

background:#6366f1;
color:white;
font-weight:bold;

cursor:pointer;

transition:0.2s;

}

button:hover{

background:#4f46e5;

}

.status{

margin-top:15px;
text-align:center;

color:#94a3b8;

}

.success{

color:#22c55e;

}

.error{

color:#ef4444;

}

</style>

</head>

<body>

<div class="card">

<h1>AI Video Translator</h1>

<input id="videoInput" type="file" accept="video/*">

<select id="languageSelect" multiple>

<option value="en">English</option>
<option value="es">Spanish</option>
<option value="de">German</option>
<option value="fr">French</option>
<option value="sr">Serbian</option>
<option value="it">Italian</option>
<option value="ar">Arabic</option>
<option value="zh">Chinese</option>
<option value="pt">Portuguese</option>
<option value="nl">Dutch</option>
<option value="pl">Polish</option>
<option value="tr">Turkish</option>

</select>

<button onclick="processVideo()">Process Video</button>

<div id="status" class="status"></div>

</div>

<script>

function processVideo(){

const file=document.getElementById("videoInput").files[0]

const languages=[...document.getElementById("languageSelect").selectedOptions]

const status=document.getElementById("status")

if(!file){

status.innerHTML="Please upload a video"
status.className="status error"

return

}

if(languages.length===0){

status.innerHTML="Select at least one language"
status.className="status error"

return

}

if(languages.length>3){

status.innerHTML="Free version supports max 3 languages"
status.className="status error"

return

}

status.innerHTML="Uploading video..."
status.className="status"

setTimeout(()=>{

status.innerHTML="Processing AI subtitles..."
},2000)

setTimeout(()=>{

status.innerHTML="Translating languages..."
},4000)

setTimeout(()=>{

status.innerHTML="Done! (backend coming next)"
status.className="status success"

},6000)

}

</script>

</body>

</html>
